name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy FrankenPHP + PHP CLI assets from previous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEW_TAG="${GITHUB_REF_NAME}"

          # Find the previous release (skip the one we just created).
          PREV_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 10 \
            --json tagName --jq "[.[] | select(.tagName != \"$NEW_TAG\" and (.tagName | startswith(\"v\")))][0].tagName")

          if [ -z "$PREV_TAG" ]; then
            echo "No previous release found — skipping FrankenPHP + PHP CLI asset copy"
            exit 0
          fi

          echo "Copying FrankenPHP + PHP CLI assets from $PREV_TAG to $NEW_TAG"

          # Download frankenphp-* and php-* assets from previous release.
          mkdir -p /tmp/release-assets
          gh release download "$PREV_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'frankenphp-*' \
            --pattern 'php-*' \
            --dir /tmp/release-assets 2>/dev/null || true

          ASSET_COUNT=$(find /tmp/release-assets -type f | wc -l | tr -d ' ')
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "No FrankenPHP / PHP CLI assets found in $PREV_TAG — skipping"
            exit 0
          fi

          echo "Found $ASSET_COUNT asset(s)"
          ls -la /tmp/release-assets/

          # Upload to the new release.
          gh release upload "$NEW_TAG" /tmp/release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

          echo "Assets copied to $NEW_TAG"
