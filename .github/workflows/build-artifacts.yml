name: Build artifacts

on:
  workflow_dispatch:
    inputs:
      skip_frankenphp:
        description: "Skip the FrankenPHP build matrix (3 PHP versions, ~30 min each)"
        type: boolean
        default: false
      skip_postgres:
        description: "Skip the PostgreSQL bundle matrix (PG 17 + 18)"
        type: boolean
        default: false
      skip_mysql:
        description: "Skip the MySQL bundle matrix (8.0 + 8.4 + 9.7)"
        type: boolean
        default: false
      skip_mailpit:
        description: "Skip the Mailpit build"
        type: boolean
        default: false
      skip_rustfs:
        description: "Skip the RustFS build"
        type: boolean
        default: false
      skip_redis:
        description: "Skip the Redis build"
        type: boolean
        default: false
  schedule:
    - cron: "0 0 * * 1"

concurrency:
  group: build-artifacts
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local

jobs:
  frankenphp:
    if: ${{ inputs.skip_frankenphp != true }}
    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
    name: FrankenPHP + PHP ${{ matrix.php }}
    runs-on: macos-15
    permissions:
      contents: read
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
    steps:
      - name: Resolve latest FrankenPHP release
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "ref=$(gh api repos/php/frankenphp/releases/latest --jq '.tag_name')" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: php/frankenphp
          ref: ${{ steps.resolve.outputs.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: |
            go.sum
            caddy/go.sum

      - name: Detect architecture
        id: arch
        run: echo "arch=$(uname -m)" >> "$GITHUB_OUTPUT"

      # Clone static-php-cli BEFORE restoring the downloads cache. The cache
      # restores dist/static-php-cli/downloads/, which creates a parent
      # dist/static-php-cli/ directory without src/. build-static.sh checks
      # for static-php-cli/src to decide whether to clone; without this
      # pre-clone, the cache-created directory wins and its fallback
      # `git clone ... static-php-cli` fails with "destination path already
      # exists". Pre-cloning ensures src/ is present, so build-static.sh
      # takes the `cd static-php-cli/ && git pull` branch instead.
      - name: Pre-clone static-php-cli
        run: |
          set -euo pipefail
          mkdir -p dist
          git clone --depth 1 https://github.com/crazywhalecc/static-php-cli dist/static-php-cli

      - name: Cache spc downloads
        uses: actions/cache@v4
        with:
          path: dist/static-php-cli/downloads
          key: spc-downloads-${{ steps.arch.outputs.arch }}-php${{ matrix.php }}-${{ steps.resolve.outputs.ref }}
          restore-keys: |
            spc-downloads-${{ steps.arch.outputs.arch }}-php${{ matrix.php }}-

      - name: Build FrankenPHP with PHP ${{ matrix.php }}
        env:
          PHP_VERSION: ${{ matrix.php }}
          FRANKENPHP_VERSION: ${{ steps.resolve.outputs.ref }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPC_OPT_DOWNLOAD_ARGS: "--ignore-cache-sources=php-src --retry 5 --prefer-pre-built"
          # Also build the standalone PHP CLI so it shares the exact same
          # extension set as the FrankenPHP binary.
          SPC_OPT_BUILD_ARGS: "--build-cli"
          CI: ""
          # xlswriter removed: its bundled minizip uses K&R function definitions
          # that C23 rejects (autoconf 2.73 enables -std=gnu23 by default).
          # Re-add once xlswriter updates their minizip.
          # imap removed: not thread-safe, incompatible with ZTS builds.
          PHP_EXTENSIONS: "amqp,apcu,ast,bcmath,brotli,bz2,calendar,ctype,curl,dba,dom,exif,fileinfo,filter,ftp,gd,gmp,gettext,iconv,igbinary,imagick,intl,ldap,lz4,mbregex,mbstring,memcached,mysqli,mysqlnd,opcache,openssl,password-argon2,parallel,pcntl,pdo,pdo_mysql,pdo_pgsql,pdo_sqlite,pdo_sqlsrv,pgsql,phar,posix,protobuf,readline,redis,session,shmop,simplexml,soap,sockets,sodium,sqlite3,sqlsrv,ssh2,sysvmsg,sysvsem,sysvshm,tidy,tokenizer,xml,xmlreader,xmlwriter,xsl,xz,zip,zlib,yaml,zstd"
        run: ./build-static.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-php${{ matrix.php }}
          path: dist/static-php-cli/log

      - name: Run sanity checks
        run: |
          BINARY=$(ls dist/frankenphp-mac-*)
          "${BINARY}" version
          "${BINARY}" build-info
          "${BINARY}" list-modules | grep frankenphp
          "${BINARY}" php-cli -r "echo 'Sanity check passed';"

      - name: Rename binary
        run: |
          ARCH="${{ steps.arch.outputs.arch }}"
          mv dist/frankenphp-mac-* "dist/frankenphp-mac-${ARCH}-php${{ matrix.php }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: frankenphp-mac-${{ steps.arch.outputs.arch }}-php${{ matrix.php }}
          path: dist/frankenphp-mac-${{ steps.arch.outputs.arch }}-php${{ matrix.php }}
          compression-level: 0

      - name: Package PHP CLI
        run: |
          set -euo pipefail
          ARCH="${{ steps.arch.outputs.arch }}"
          PHP_BIN="dist/static-php-cli/buildroot/bin/php"
          INI_DEV="dist/static-php-cli/source/php-src/php.ini-development"
          chmod +x "$PHP_BIN"
          "$PHP_BIN" -v
          "$PHP_BIN" -m
          test -f "$INI_DEV" || { echo "::error::missing $INI_DEV — php-src layout may have changed"; exit 1; }
          mkdir -p dist/cli-staging
          cp "$PHP_BIN" dist/cli-staging/php
          cp "$INI_DEV" dist/cli-staging/php.ini-development
          tar -C dist/cli-staging -czf "dist/php-mac-${ARCH}-php${{ matrix.php }}.tar.gz" php php.ini-development

          # Sanity: verify both files extract back out cleanly.
          mkdir -p dist/cli-verify
          tar -C dist/cli-verify -xzf "dist/php-mac-${ARCH}-php${{ matrix.php }}.tar.gz"
          test -x dist/cli-verify/php
          test -s dist/cli-verify/php.ini-development
          rm -rf dist/cli-staging dist/cli-verify

      - name: Upload PHP CLI
        uses: actions/upload-artifact@v4
        with:
          name: php-mac-${{ steps.arch.outputs.arch }}-php${{ matrix.php }}
          path: dist/php-mac-${{ steps.arch.outputs.arch }}-php${{ matrix.php }}.tar.gz
          compression-level: 0

  postgres:
    if: ${{ inputs.skip_postgres != true }}
    strategy:
      fail-fast: false
      matrix:
        pg: ["17", "18"]
    name: PostgreSQL ${{ matrix.pg }}
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout pv (for scripts/test-postgres-bundle.sh)
        uses: actions/checkout@v4

      - name: Resolve latest patch version from theseus-rs
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ALL=$(gh api 'repos/theseus-rs/postgresql-binaries/releases?per_page=100' --paginate --jq '.[] | select(.prerelease==false) | .tag_name')
          VER=$(echo "$ALL" | grep "^${{ matrix.pg }}\." | sort -V | tail -1)
          if [ -z "$VER" ]; then
            echo "::error::No ${{ matrix.pg }}.x release on theseus-rs"
            exit 1
          fi
          echo "Resolved PG ${{ matrix.pg }} → $VER"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Download and extract theseus-rs bundle
        run: |
          set -euo pipefail
          VER="${{ steps.resolve.outputs.version }}"
          URL="https://github.com/theseus-rs/postgresql-binaries/releases/download/${VER}/postgresql-${VER}-aarch64-apple-darwin.tar.gz"
          curl -fsSL -o pg.tar.gz "$URL"
          mkdir extracted
          tar -xzf pg.tar.gz -C extracted
          STAGING=$(ls -d extracted/postgresql-*-aarch64-apple-darwin)
          echo "STAGING=$STAGING" >> "$GITHUB_ENV"

      - name: Bundle Homebrew openssl into staging
        run: |
          set -euo pipefail
          cp /opt/homebrew/opt/openssl@3/lib/libssl.3.dylib   "$STAGING/lib/"
          cp /opt/homebrew/opt/openssl@3/lib/libcrypto.3.dylib "$STAGING/lib/"
          chmod 755 "$STAGING/lib/libssl.3.dylib" "$STAGING/lib/libcrypto.3.dylib"

      - name: Patch install_names to relative paths
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Walk every Mach-O in bin/ and lib/. For each:
          #   - If it's a dylib whose LC_ID_DYLIB points at a build-host path
          #     (Homebrew or theseus's CI workspace), rewrite it to
          #     @executable_path/../lib/<basename>.
          #   - For every LC_LOAD_DYLIB pointing at a build-host path, rewrite
          #     to @executable_path/../lib/<basename>.
          # Build-host path patterns seen in theseus-rs's macOS arm64 bundles:
          #   /opt/homebrew/...                          (Homebrew openssl, Cellar paths)
          #   /Users/runner/work/postgresql-binaries/... (theseus's CI workspace)
          for f in "$STAGING/bin/"* "$STAGING/lib/"*.dylib; do
            [ -L "$f" ] && continue
            [ -f "$f" ] || continue
            if ! file -b "$f" | grep -q '^Mach-O'; then continue; fi

            # Fix LC_ID_DYLIB on dylibs whose identity is a build-host path.
            if [[ "$f" == *.dylib ]]; then
              own=$(otool -D "$f" | tail -n +2)
              case "$own" in
                /opt/homebrew/*|/Users/runner/*)
                  install_name_tool -id "@executable_path/../lib/$(basename "$own")" "$f"
                  ;;
              esac
            fi

            # Fix LC_LOAD_DYLIB entries pointing at build-host paths.
            otool -L "$f" | tail -n +2 | awk '{print $1}' | while read -r ref; do
              case "$ref" in
                /opt/homebrew/*|/Users/runner/*)
                  install_name_tool -change "$ref" "@executable_path/../lib/$(basename "$ref")" "$f" 2>/dev/null || true
                  ;;
              esac
            done
          done

      - name: Ad-hoc codesign all Mach-O files
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in "$STAGING/bin/"* "$STAGING/lib/"*.dylib; do
            [ -L "$f" ] && continue
            [ -f "$f" ] || continue
            if file -b "$f" | grep -q '^Mach-O'; then
              codesign --force --sign - "$f"
            fi
          done

      - name: Verify no build-host paths remain in any binary
        run: |
          set -euo pipefail
          shopt -s nullglob
          LEAKS=0
          for f in "$STAGING/bin/"* "$STAGING/lib/"*.dylib; do
            [ -L "$f" ] && continue
            [ -f "$f" ] || continue
            if ! file -b "$f" | grep -q '^Mach-O'; then continue; fi
            bad=$(otool -L "$f" | tail -n +2 | awk '{print $1}' | grep -E '^/(opt/homebrew|Users/runner)' || true)
            if [ -n "$bad" ]; then
              echo "::error::Build-host path leak in $(basename "$f"):"
              echo "$bad"
              LEAKS=$((LEAKS+1))
            fi
          done
          if [ "$LEAKS" -ne 0 ]; then
            echo "::error::$LEAKS file(s) still reference build-host paths after patching"
            exit 1
          fi
          echo "All Mach-O files reference only relative or system paths."

      - name: Integration test (initdb + extensions + pgbench + amcheck + dump roundtrip)
        run: bash scripts/test-postgres-bundle.sh "$STAGING"

      - name: Strip docs
        run: rm -rf "$STAGING/share/doc"

      - name: Structural sanity checks
        run: |
          set -euo pipefail
          test -f "$STAGING/bin/postgres"
          test -f "$STAGING/bin/initdb"
          test -f "$STAGING/bin/pg_ctl"
          test -f "$STAGING/bin/psql"
          test -f "$STAGING/bin/pg_dump"
          test -f "$STAGING/bin/pg_config"
          test -f "$STAGING/lib/libssl.3.dylib"
          test -f "$STAGING/lib/libcrypto.3.dylib"
          test -d "$STAGING/share/extension"
          test -d "$STAGING/include"
          echo "Structural sanity checks passed."

      - name: Repack
        run: tar -czf "postgres-mac-arm64-${{ matrix.pg }}.tar.gz" -C "$STAGING" bin lib share include

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: postgres-mac-arm64-${{ matrix.pg }}
          path: postgres-mac-arm64-${{ matrix.pg }}.tar.gz
          compression-level: 0

  mysql:
    if: ${{ inputs.skip_mysql != true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - major: "8.0"
            version: "8.0.43"
            path: "archives/mysql-8.0"
          - major: "8.4"
            version: "8.4.9"
            path: "Downloads/MySQL-8.4"
          - major: "9.7"
            version: "9.7.0"
            path: "Downloads/MySQL-9.7"
    name: MySQL ${{ matrix.major }}
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout pv (for scripts/test-mysql-bundle.sh)
        uses: actions/checkout@v4

      - name: Download Oracle tarball
        run: |
          set -euo pipefail
          URL="https://cdn.mysql.com/${{ matrix.path }}/mysql-${{ matrix.version }}-macos15-arm64.tar.gz"
          echo "Downloading $URL"
          curl -fsSL -o mysql.tar.gz "$URL"
          ls -lh mysql.tar.gz

      - name: Extract
        run: |
          set -euo pipefail
          mkdir extracted
          tar -xzf mysql.tar.gz -C extracted
          STAGING=$(ls -d extracted/mysql-*-macos15-arm64)
          echo "STAGING=$STAGING" >> "$GITHUB_ENV"

      - name: Strip
        run: |
          set -euo pipefail
          # Drop debug build (~201M), mecab Japanese FTS dictionaries (~119M),
          # debug plugin variants (~18M), non-English locales (~10M), and
          # everything irrelevant at runtime.
          rm -f  "$STAGING/bin/mysqld-debug"
          rm -rf "$STAGING/lib/mecab"
          rm -rf "$STAGING/lib/plugin/debug"
          rm -rf "$STAGING/lib/pkgconfig"
          rm -rf "$STAGING/docs" "$STAGING/man" "$STAGING/support-files" "$STAGING/include"
          # Keep share/english + share/charsets (mandatory at runtime); drop other locales.
          find "$STAGING/share" -mindepth 1 -maxdepth 1 -type d \
            ! -name english ! -name charsets -exec rm -rf {} +

      - name: Defensive install_name fixup on libfido2
        run: |
          set -euo pipefail
          # libfido2's LC_ID_DYLIB ships with /usr/local/mysql/lib/libfido2.1.dylib
          # — cosmetic; nothing in the bundle links via that path. We rewrite it
          # so the verify step below can be strict about /usr/local/mysql refs.
          FIDO=$(ls "$STAGING"/lib/libfido2.*.dylib 2>/dev/null | head -1 || true)
          if [ -n "$FIDO" ]; then
            install_name_tool -id "@loader_path/libfido2.1.dylib" "$FIDO"
            echo "Fixed up $FIDO"
          else
            echo "No libfido2 dylib found (unexpected — research showed this should be present)"
            exit 1
          fi

      - name: Verify no build-host paths
        run: |
          set -euo pipefail
          shopt -s nullglob
          LEAKS=0
          # Walk every Mach-O recursively under bin/ and lib/ (plugins live in lib/plugin/).
          while IFS= read -r f; do
            [ -L "$f" ] && continue
            [ -f "$f" ] || continue
            if ! file -b "$f" | grep -q '^Mach-O'; then continue; fi
            bad=$(otool -L "$f" 2>/dev/null | tail -n +2 | awk '{print $1}' \
                  | grep -E '^/(opt/homebrew|Users/runner|usr/local/mysql)' || true)
            if [ -n "$bad" ]; then
              echo "::error::Host path leak in $(basename "$f"):"
              echo "$bad"
              LEAKS=$((LEAKS+1))
            fi
          done < <(find "$STAGING/bin" "$STAGING/lib" -type f)
          if [ "$LEAKS" -ne 0 ]; then
            echo "::error::$LEAKS file(s) reference build-host paths"
            exit 1
          fi
          echo "All Mach-O files reference only @loader_path / system paths."

      - name: Smoke test
        run: bash scripts/test-mysql-bundle.sh "$STAGING"

      - name: Structural sanity checks
        run: |
          set -euo pipefail
          test -x "$STAGING/bin/mysqld"
          test -x "$STAGING/bin/mysql"
          test -x "$STAGING/bin/mysqladmin"
          test -x "$STAGING/bin/mysqldump"
          test -f "$STAGING/lib/libssl.3.dylib"
          test -f "$STAGING/lib/libcrypto.3.dylib"
          test -d "$STAGING/share/english"
          test -d "$STAGING/share/charsets"
          echo "Structural sanity checks passed."

      - name: Repack
        run: tar -czf "mysql-mac-arm64-${{ matrix.major }}.tar.gz" -C "$STAGING" .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mysql-mac-arm64-${{ matrix.major }}
          path: mysql-mac-arm64-${{ matrix.major }}.tar.gz
          compression-level: 0

  mailpit:
    if: ${{ inputs.skip_mailpit != true }}
    name: Mailpit
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout pv (for scripts/test-mailpit-bundle.sh)
        uses: actions/checkout@v4

      - name: Resolve latest release
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG=$(gh api repos/axllent/mailpit/releases/latest --jq '.tag_name')
          echo "Resolved Mailpit → $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download
        run: |
          set -euo pipefail
          TAG="${{ steps.resolve.outputs.tag }}"
          URL="https://github.com/axllent/mailpit/releases/download/${TAG}/mailpit-darwin-arm64.tar.gz"
          echo "Downloading $URL"
          curl -fsSL -o mailpit.tar.gz "$URL"
          ls -lh mailpit.tar.gz

      - name: Extract
        run: |
          set -euo pipefail
          mkdir -p staging
          tar -xzf mailpit.tar.gz -C staging
          chmod +x staging/mailpit
          staging/mailpit version

      - name: Smoke test
        run: bash scripts/test-mailpit-bundle.sh staging/mailpit

      - name: Repack
        run: |
          set -euo pipefail
          tar -czf mailpit-mac-arm64.tar.gz -C staging mailpit

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mailpit-mac-arm64
          path: mailpit-mac-arm64.tar.gz
          compression-level: 0

  rustfs:
    if: ${{ inputs.skip_rustfs != true }}
    name: RustFS
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout pv (for scripts/test-rustfs-bundle.sh)
        uses: actions/checkout@v4

      - name: Download pinned release
        run: |
          set -euo pipefail
          # Pinned: 1.0.0-beta.2 has no release assets. Remove pin when fixed.
          VERSION="1.0.0-beta.1"
          URL="https://github.com/rustfs/rustfs/releases/download/${VERSION}/rustfs-macos-aarch64-v${VERSION}.zip"
          echo "Downloading $URL"
          curl -fsSL -o rustfs.zip "$URL"
          ls -lh rustfs.zip

      - name: Extract
        run: |
          set -euo pipefail
          mkdir -p staging
          unzip -o rustfs.zip -d staging
          chmod +x staging/rustfs
          staging/rustfs --version

      - name: Smoke test
        run: bash scripts/test-rustfs-bundle.sh staging/rustfs

      - name: Rename binary
        run: mv staging/rustfs rustfs-mac-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustfs-mac-arm64
          path: rustfs-mac-arm64
          compression-level: 0

  redis:
    if: ${{ inputs.skip_redis != true }}
    name: Redis
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout pv (for scripts/test-redis-bundle.sh)
        uses: actions/checkout@v4

      - name: Resolve latest stable version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG=$(gh api repos/redis/redis/releases/latest --jq '.tag_name')
          echo "Resolved Redis → $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download source
        run: |
          set -euo pipefail
          TAG="${{ steps.resolve.outputs.tag }}"
          URL="https://github.com/redis/redis/archive/refs/tags/${TAG}.tar.gz"
          echo "Downloading $URL"
          curl -fsSL -o redis-src.tar.gz "$URL"
          tar -xzf redis-src.tar.gz
          echo "SRC_DIR=redis-${TAG}" >> "$GITHUB_ENV"

      - name: Build
        run: |
          set -euo pipefail
          cd "$SRC_DIR"
          make -j$(sysctl -n hw.ncpu) MALLOC=libc BUILD_TLS=no USE_SYSTEMD=no

      - name: Verify no external deps
        run: |
          set -euo pipefail
          for bin in "$SRC_DIR/src/redis-server" "$SRC_DIR/src/redis-cli"; do
            echo "=== $(basename "$bin") ==="
            otool -L "$bin"
            bad=$(otool -L "$bin" | tail -n +2 | awk '{print $1}' | grep -vE '^(/usr/lib/|@)' || true)
            if [ -n "$bad" ]; then
              echo "::error::$(basename "$bin") links against non-system libraries:"
              echo "$bad"
              exit 1
            fi
          done
          echo "All binaries link only against system libraries."

      - name: Smoke test
        run: |
          set -euo pipefail
          mkdir -p staging
          cp "$SRC_DIR/src/redis-server" staging/
          cp "$SRC_DIR/src/redis-cli" staging/
          chmod +x staging/redis-server staging/redis-cli
          bash scripts/test-redis-bundle.sh staging

      - name: Package
        run: tar -czf redis-mac-arm64.tar.gz -C staging redis-server redis-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redis-mac-arm64
          path: redis-mac-arm64.tar.gz
          compression-level: 0

  release:
    needs: [frankenphp, postgres, mysql]
    # Only publish from main, and only when every build family ran. A skipped
    # build job reports as "success" to its dependents, so without these extra
    # clauses a dispatch with skip_* flags would publish a half-baked release.
    if: ${{ github.ref == 'refs/heads/main' && inputs.skip_frankenphp != true && inputs.skip_postgres != true && inputs.skip_mysql != true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: frankenphp-mac-*
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          pattern: php-mac-*
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          pattern: postgres-mac-arm64-*
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          pattern: mysql-mac-arm64-*
          path: artifacts

      - name: Prepare release assets
        run: |
          set -euo pipefail
          shopt -s nullglob

          fp_dirs=(artifacts/frankenphp-mac-*)
          php_dirs=(artifacts/php-mac-*)

          # Never publish an incomplete release. Every FrankenPHP binary must
          # ship with a matching PHP CLI tarball for the same arch+version.
          if [ ${#fp_dirs[@]} -eq 0 ]; then
            echo "::error::No FrankenPHP artifacts were downloaded"
            exit 1
          fi
          if [ ${#php_dirs[@]} -eq 0 ]; then
            echo "::error::No PHP CLI artifacts were downloaded"
            exit 1
          fi
          if [ ${#fp_dirs[@]} -ne ${#php_dirs[@]} ]; then
            echo "::error::Artifact count mismatch: ${#fp_dirs[@]} FrankenPHP vs ${#php_dirs[@]} PHP CLI"
            exit 1
          fi
          for dir in "${fp_dirs[@]}"; do
            suffix="${dir#artifacts/frankenphp-}"
            if [ ! -d "artifacts/php-${suffix}" ]; then
              echo "::error::Missing PHP CLI artifact for frankenphp-${suffix}"
              exit 1
            fi
          done

          # Postgres bundles: expect one per major in postgres.strategy.matrix.pg.
          # Keep this count in sync with that matrix when adding/removing majors.
          pg_dirs=(artifacts/postgres-mac-arm64-*)
          if [ ${#pg_dirs[@]} -ne 2 ]; then
            echo "::error::Expected 2 postgres bundles (17 + 18), found ${#pg_dirs[@]}"
            exit 1
          fi

          # MySQL bundles: expect one per major in mysql.strategy.matrix.include.
          # Keep this count in sync with that matrix when adding/removing majors.
          mysql_dirs=(artifacts/mysql-mac-arm64-*)
          if [ ${#mysql_dirs[@]} -ne 3 ]; then
            echo "::error::Expected 3 mysql bundles (8.0 + 8.4 + 9.7), found ${#mysql_dirs[@]}"
            exit 1
          fi

          mkdir -p release
          # FrankenPHP binaries: artifact dir name matches the binary name.
          for dir in "${fp_dirs[@]}"; do
            name=$(basename "$dir")
            cp "$dir"/* "release/"
            chmod +x "release/${name}"
          done
          # PHP CLI tarballs: just copy as-is (no chmod needed).
          for dir in "${php_dirs[@]}"; do
            cp "$dir"/* "release/"
          done
          # Postgres tarballs: copy as-is (no chmod needed).
          for dir in "${pg_dirs[@]}"; do
            cp "$dir"/* "release/"
          done
          # MySQL tarballs: copy as-is (no chmod needed).
          for dir in "${mysql_dirs[@]}"; do
            cp "$dir"/* "release/"
          done
          ls -la release/

      - name: Upload to artifacts release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # All FrankenPHP + PHP CLI binaries live in a single non-versioned
          # "artifacts" release, independent of pv's own versioned (v*) releases.
          # Create it on first run, then clobber on every rebuild.
          TAG="artifacts"

          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Creating $TAG release"
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "pv binaries (FrankenPHP, PHP CLI, PostgreSQL, MySQL)" \
              --notes "Rolling release of binaries used by pv: FrankenPHP, static PHP CLI, PostgreSQL, and MySQL. Rebuilt weekly by build-artifacts.yml. Not a versioned pv release." \
              --latest=false
          fi

          echo "Uploading all binaries to $TAG"
          gh release upload "$TAG" release/* \
            --repo "${{ github.repository }}" \
            --clobber

          echo "Assets uploaded to $TAG"
