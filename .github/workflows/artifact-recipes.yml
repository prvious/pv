name: Artifact Recipes

on:
  workflow_dispatch:
    inputs:
      resource:
        description: "Resource to build: all, php, composer, redis, mysql, postgres, mailpit, rustfs"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - php
          - composer
          - redis
          - mysql
          - postgres
          - mailpit
          - rustfs
      track:
        description: "Track to build: all; PHP/all supports 8.2, 8.3, 8.4; resource tracks: composer 2, redis 8.2, mysql 8.4, postgres 18, mailpit 1, rustfs 1"
        required: true
        default: "8.4"
        type: string
      platform:
        description: "Artifact platform: all, darwin-arm64, darwin-amd64"
        required: true
        default: "darwin-arm64"
        type: choice
        options:
          - all
          - darwin-arm64
          - darwin-amd64

permissions:
  contents: read

jobs:
  validate:
    name: Validate Inputs and Recipes
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate selected inputs
        env:
          PV_RECIPE_RESOURCE: ${{ inputs.resource }}
          PV_RECIPE_TRACK: ${{ inputs.track }}
          PV_RECIPE_PLATFORM: ${{ inputs.platform }}
        run: |
          set -eu

          case "$PV_RECIPE_PLATFORM" in
            all | darwin-arm64 | darwin-amd64) ;;
            *) printf '%s\n' "unsupported platform: $PV_RECIPE_PLATFORM" >&2; exit 1 ;;
          esac

          case "$PV_RECIPE_RESOURCE:$PV_RECIPE_TRACK" in
            all:all | all:8.2 | all:8.3 | all:8.4) ;;
            php:all | php:8.2 | php:8.3 | php:8.4) ;;
            composer:all | composer:2) ;;
            redis:all | redis:8.2) ;;
            mysql:all | mysql:8.4) ;;
            postgres:all | postgres:18) ;;
            mailpit:all | mailpit:1) ;;
            rustfs:all | rustfs:1) ;;
            *)
              printf '%s\n' "unsupported resource/track combination: $PV_RECIPE_RESOURCE/$PV_RECIPE_TRACK" >&2
              exit 1
              ;;
          esac

      - name: Validate recipe metadata
        run: |
          set -eu
          fixtures_dir=/tmp/pv-recipe-fixtures
          rm -rf "$fixtures_dir"
          cargo run -p pv-release -- generate-recipe-fixtures \
            --php release/artifacts/recipes/php/tracks.toml \
            --composer release/artifacts/recipes/composer/composer.toml \
            --redis release/artifacts/recipes/redis/recipe.toml \
            --mysql release/artifacts/recipes/mysql/recipe.toml \
            --postgres release/artifacts/recipes/postgres/recipe.toml \
            --mailpit release/artifacts/recipes/mailpit/recipe.toml \
            --rustfs release/artifacts/recipes/rustfs/recipe.toml \
            --archives "$fixtures_dir/archives" \
            --records "$fixtures_dir/records" \
            --pv-commit "$(git rev-parse HEAD)" \
            --build-run-id "${{ github.run_id }}"
          cargo run -p pv-release -- generate-manifest \
            --records "$fixtures_dir/records" \
            --revocations release/artifacts/revocations \
            --defaults release/artifacts/default-tracks.toml \
            --output "$fixtures_dir/manifest.json" \
            --base-url https://artifacts.example.test

  build-php:
    name: Build PHP and FrankenPHP ${{ matrix.platform }}
    needs: validate
    if: ${{ inputs.resource == 'all' || inputs.resource == 'php' }}
    runs-on: ${{ matrix.platform == 'darwin-amd64' && 'macos-15-intel' || 'macos-14' }}
    strategy:
      fail-fast: false
      matrix:
        # StaticPHP v3 currently fails the FrankenPHP macOS Intel link step, and
        # PHP 8.3 patching is unstable. Keep the default publication proof on the
        # known-good arm64/PHP 8.4 lane; explicit darwin-amd64 dispatch remains
        # available only for diagnostics until upstream v3 is fixed.
        platform: ${{ fromJSON(inputs.platform == 'all' && '["darwin-arm64"]' || format('["{0}"]', inputs.platform)) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install PHP runtime dependency
        run: |
          set -eu
          brew update
          brew install php

      - name: Install StaticPHP CLI
        run: |
          set -eu
          runner_architecture=$(uname -m)
          case "$runner_architecture" in
            arm64) static_php_architecture=aarch64 ;;
            x86_64) static_php_architecture=x86_64 ;;
            *)
              printf '%s\n' "unsupported StaticPHP CLI architecture: $runner_architecture" >&2
              exit 1
              ;;
          esac

          mkdir -p "${RUNNER_TEMP:?}/pv-tools"
          curl -L --fail --show-error --silent \
            --retry 3 --retry-delay 2 --retry-all-errors \
            --connect-timeout 20 --max-time 600 \
            "https://dl.static-php.dev/v3/spc-bin/nightly/spc-macos-$static_php_architecture" \
            -o "$RUNNER_TEMP/pv-tools/spc"
          chmod +x "$RUNNER_TEMP/pv-tools/spc"
          "$RUNNER_TEMP/pv-tools/spc" --version
          "$RUNNER_TEMP/pv-tools/spc" build:php --help | grep -- '--build-frankenphp' >/dev/null
          "$RUNNER_TEMP/pv-tools/spc" build:php --help | grep -- '--dl-custom-local' >/dev/null
          printf '%s\n' "$RUNNER_TEMP/pv-tools" >>"${GITHUB_PATH:?}"

      - name: Build PHP and FrankenPHP artifacts
        env:
          PV_RECIPE_TRACK: ${{ inputs.track }}
          PV_RECIPE_PLATFORM: ${{ matrix.platform }}
          PV_ARTIFACT_OUT_DIR: ${{ runner.temp }}/pv-artifacts
          PV_ARTIFACT_RECORD_DIR: ${{ runner.temp }}/pv-records
          PV_COMMIT: ${{ github.sha }}
          PV_BUILD_RUN_ID: ${{ github.run_id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -eu

          rm -rf "$PV_ARTIFACT_OUT_DIR" "$PV_ARTIFACT_RECORD_DIR"
          mkdir -p "$PV_ARTIFACT_OUT_DIR" "$PV_ARTIFACT_RECORD_DIR"

          case "$PV_RECIPE_TRACK" in
            all)
              php_track_list='8.2
          8.3
          8.4'
              ;;
            *)
              php_track_list=$PV_RECIPE_TRACK
              ;;
          esac

          while IFS= read -r track; do
            [ -n "$track" ] || continue
            PV_RECIPE_TRACK="$track" \
              release/artifacts/recipes/php/build.sh
          done <<PHP_TRACKS
          $php_track_list
          PHP_TRACKS

          # StaticPHP's Go module cache can leave read-only files under work/.
          # Restore user write permission before pruning non-uploaded build scratch.
          if [ -d "$PV_ARTIFACT_OUT_DIR/work" ]; then
            chmod -R u+w "$PV_ARTIFACT_OUT_DIR/work"
          fi
          rm -rf "$PV_ARTIFACT_OUT_DIR/sources" "$PV_ARTIFACT_OUT_DIR/work"

      - name: Upload StaticPHP failure logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: pv-artifact-recipes-staticphp-logs-${{ matrix.platform }}-${{ github.run_id }}
          path: ${{ runner.temp }}/pv-artifacts/work/**/staticphp/log/*.log
          if-no-files-found: ignore

      - name: Generate manifest from records
        env:
          PV_RECIPE_TRACK: ${{ inputs.track }}
          PV_ARTIFACT_RECORD_DIR: ${{ runner.temp }}/pv-records
          PV_ARTIFACT_OUT_DIR: ${{ runner.temp }}/pv-artifacts
          PV_MANIFEST_DEFAULTS: ${{ runner.temp }}/pv-default-tracks.toml
        run: |
          set -eu

          php_default_track=$PV_RECIPE_TRACK
          if [ "$php_default_track" = all ]; then
            php_default_track=8.4
          fi

          cat >"$PV_MANIFEST_DEFAULTS" <<DEFAULT_TRACKS
          [[resource]]
          name = "php"
          default_track = "$php_default_track"

          [[resource]]
          name = "frankenphp"
          default_track = "$php_default_track"

          DEFAULT_TRACKS

          cargo run -p pv-release -- generate-manifest \
            --records "$PV_ARTIFACT_RECORD_DIR" \
            --revocations release/artifacts/revocations \
            --defaults "$PV_MANIFEST_DEFAULTS" \
            --output "$PV_ARTIFACT_OUT_DIR/manifest.json" \
            --base-url https://artifacts.example.test

      - name: Upload artifact archives and records
        uses: actions/upload-artifact@v7
        with:
          name: pv-artifact-recipes-php-${{ inputs.track }}-${{ matrix.platform }}-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/pv-artifacts/*.tar.gz
            ${{ runner.temp }}/pv-artifacts/manifest.json
            ${{ runner.temp }}/pv-records/**/*.json
          if-no-files-found: error

  build-composer:
    name: Build Composer ${{ matrix.platform }}
    needs: validate
    if: ${{ inputs.resource == 'all' || inputs.resource == 'composer' }}
    runs-on: ${{ matrix.platform == 'darwin-amd64' && 'macos-15-intel' || 'macos-14' }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(inputs.platform == 'all' && '["darwin-arm64"]' || format('["{0}"]', inputs.platform)) }}

    steps:
      - name: Checkout
