doc-valid-idents = [
  "PV",
  "SQLite",
  "MySQL",
  "Postgres",
  "PostgreSQL",
  "Redis",
  "Mailpit",
  "RustFS",
  "FrankenPHP",
  "Caddy",
  "Laravel",
  "macOS",
  "LaunchAgent",
  "LaunchAgents",
  "Tokio",
  "Clippy",
  "Nextest",
  "NDJSON",
  "JSONL",
  "SNI",
  "TLS",
  "HTTP",
  "HTTPS",
  "DNS",
  "TCP",
  "UDP",
  "IPv4",
  "IPv6",
  "AArch64",
  "GitHub",
  "Homebrew",
  "Keychain",
  "..", # Include Clippy's defaults.
]

disallowed-types = [
  { path = "std::fs::DirEntry", reason = "use PV filesystem helpers so permissions, test home injection, atomic writes, and ownership checks are applied" },
  { path = "std::fs::File", reason = "use PV filesystem helpers so permissions, test home injection, atomic writes, and ownership checks are applied" },
  { path = "std::fs::OpenOptions", reason = "use PV filesystem helpers so permissions, test home injection, atomic writes, and ownership checks are applied" },
  { path = "std::fs::ReadDir", reason = "use PV filesystem helpers so permissions, test home injection, atomic writes, and ownership checks are applied" },
  { path = "tokio::fs::DirBuilder", reason = "use PV filesystem helpers so permissions, test home injection, atomic writes, and ownership checks are applied" },
  { path = "tokio::fs::DirEntry", reason = "use PV filesystem helpers so permissions, test home injection, atomic writes, and ownership checks are applied" },
  { path = "tokio::fs::File", reason = "use PV filesystem helpers so permissions, test home injection, atomic writes, and ownership checks are applied" },
  { path = "tokio::fs::OpenOptions", reason = "use PV filesystem helpers so permissions, test home injection, atomic writes, and ownership checks are applied" },
  { path = "tokio::fs::ReadDir", reason = "use PV filesystem helpers so permissions, test home injection, atomic writes, and ownership checks are applied" },
  { path = "std::process::Command", reason = "use PV process, sudo, or supervisor helpers so logging, ownership checks, and argument handling are consistent" },
  { path = "tokio::process::Command", reason = "use PV process, sudo, or supervisor helpers so logging, ownership checks, and argument handling are consistent" },
]

disallowed-methods = [
  { path = "std::env::current_dir", reason = "use PV environment/path helpers so Project resolution is testable" },
  { path = "std::env::current_exe", reason = "use PV environment/path helpers so binary resolution is centralized" },
  { path = "std::env::remove_var", reason = "use PV environment helpers so mutation is explicit and testable" },
  { path = "std::env::set_var", reason = "use PV environment helpers so mutation is explicit and testable" },
  { path = "std::env::var", reason = "use PV environment helpers so shell/setup behavior is centralized and testable" },
  { path = "std::env::var_os", reason = "use PV environment helpers so shell/setup behavior is centralized and testable" },
  { path = "std::fs::canonicalize", reason = "use PV filesystem helpers so path safety and symlink policy are centralized" },
  { path = "std::fs::copy", reason = "use PV filesystem helpers so permissions, atomicity, and diagnostics are consistent" },
  { path = "std::fs::create_dir", reason = "use PV filesystem helpers so permissions and ownership checks are applied" },
  { path = "std::fs::create_dir_all", reason = "use PV filesystem helpers so permissions and ownership checks are applied" },
  { path = "std::fs::hard_link", reason = "use PV filesystem helpers so path safety and ownership checks are centralized" },
  { path = "std::fs::metadata", reason = "use PV filesystem helpers so symlink and ownership policy are explicit" },
  { path = "std::fs::read", reason = "use PV filesystem helpers so path safety and diagnostics are centralized" },
  { path = "std::fs::read_dir", reason = "use PV filesystem helpers so path safety and diagnostics are centralized" },
  { path = "std::fs::read_link", reason = "use PV filesystem helpers so symlink policy is centralized" },
  { path = "std::fs::read_to_string", reason = "use PV filesystem helpers so path safety and diagnostics are centralized" },
  { path = "std::fs::remove_dir", reason = "use PV filesystem helpers so destructive actions require explicit policy" },
  { path = "std::fs::remove_dir_all", reason = "use PV filesystem helpers so destructive actions require explicit policy" },
  { path = "std::fs::remove_file", reason = "use PV filesystem helpers so destructive actions require explicit policy" },
  { path = "std::fs::rename", reason = "use PV filesystem helpers so atomic writes and cross-filesystem behavior are explicit" },
  { path = "std::fs::set_permissions", reason = "use PV filesystem helpers so permission policy is centralized" },
  { path = "std::fs::soft_link", reason = "use PV filesystem helpers so symlink policy is centralized" },
  { path = "std::fs::symlink_metadata", reason = "use PV filesystem helpers so symlink and ownership policy are explicit" },
  { path = "std::fs::write", reason = "use PV filesystem helpers so atomic writes, permissions, and diagnostics are consistent" },
  { path = "std::mem::zeroed", reason = "avoid unsafe zero-initialization; use explicit initialization or MaybeUninit with a SAFETY comment" },
  { path = "std::thread::spawn", reason = "use Tokio tasks or PV process/thread helpers so shutdown and diagnostics are consistent" },
  { path = "tokio::fs::canonicalize", reason = "use PV filesystem helpers so path safety and symlink policy are centralized" },
  { path = "tokio::fs::copy", reason = "use PV filesystem helpers so permissions, atomicity, and diagnostics are consistent" },
  { path = "tokio::fs::create_dir", reason = "use PV filesystem helpers so permissions and ownership checks are applied" },
  { path = "tokio::fs::create_dir_all", reason = "use PV filesystem helpers so permissions and ownership checks are applied" },
  { path = "tokio::fs::hard_link", reason = "use PV filesystem helpers so path safety and ownership checks are centralized" },
  { path = "tokio::fs::metadata", reason = "use PV filesystem helpers so symlink and ownership policy are explicit" },
  { path = "tokio::fs::read", reason = "use PV filesystem helpers so path safety and diagnostics are centralized" },
  { path = "tokio::fs::read_dir", reason = "use PV filesystem helpers so path safety and diagnostics are centralized" },
  { path = "tokio::fs::read_link", reason = "use PV filesystem helpers so symlink policy is centralized" },
  { path = "tokio::fs::read_to_string", reason = "use PV filesystem helpers so path safety and diagnostics are centralized" },
  { path = "tokio::fs::remove_dir", reason = "use PV filesystem helpers so destructive actions require explicit policy" },
  { path = "tokio::fs::remove_dir_all", reason = "use PV filesystem helpers so destructive actions require explicit policy" },
  { path = "tokio::fs::remove_file", reason = "use PV filesystem helpers so destructive actions require explicit policy" },
  { path = "tokio::fs::rename", reason = "use PV filesystem helpers so atomic writes and cross-filesystem behavior are explicit" },
  { path = "tokio::fs::set_permissions", reason = "use PV filesystem helpers so permission policy is centralized" },
  { path = "tokio::fs::symlink_metadata", reason = "use PV filesystem helpers so symlink and ownership policy are explicit" },
  { path = "tokio::fs::try_exists", reason = "use PV filesystem helpers so path safety and diagnostics are centralized" },
  { path = "tokio::fs::write", reason = "use PV filesystem helpers so atomic writes, permissions, and diagnostics are consistent" },
  { path = "std::os::unix::fs::symlink", reason = "use PV filesystem helpers so symlink policy is centralized", allow-invalid = true },
  { path = "tokio::fs::symlink", reason = "use PV filesystem helpers so symlink policy is centralized", allow-invalid = true },
]

disallowed-macros = [
  { path = "std::dbg", reason = "remove debug output before commit" },
  { path = "std::eprint", reason = "use PV output helpers or tracing" },
  { path = "std::eprintln", reason = "use PV output helpers or tracing" },
  { path = "std::print", reason = "use PV output helpers or tracing" },
  { path = "std::println", reason = "use PV output helpers or tracing" },
]

accept-comment-above-attributes = true
avoid-breaking-exported-api = false
enum-variant-size-threshold = 128
pass-by-value-size-limit = 64
stack-size-threshold = 131072
too-large-for-stack = 4096
