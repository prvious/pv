version: 2

project_name: pv

builds:
  - main: .
    binary: pv
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/prvious/pv/cmd.version={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: prvious
    name: pv
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
